<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #0f0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .profile-card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 25px 45px rgba(0,0,0,0.4); }
        .avatar-big { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #c23152); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 700; color: white; margin: 0 auto 15px; }
        .profile-name { color: white; font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .profile-role { text-align: center; margin-bottom: 30px; }
        .role-badge { padding: 4px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .role-STUDENT { background: rgba(13,202,240,0.2); color: #0dcaf0; }
        .role-TEACHER { background: rgba(255,193,7,0.2); color: #ffc107; }
        .role-ADMIN { background: rgba(233,69,96,0.2); color: #e94560; }
        .info-row { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .info-row:last-child { border-bottom: none; }
        .info-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(233,69,96,0.15); display: flex; align-items: center; justify-content: center; color: #e94560; font-size: 0.9rem; flex-shrink: 0; }
        .info-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { color: white; font-size: 0.95rem; font-weight: 500; }
        .btn-back { background: linear-gradient(135deg, #e94560, #c23152); border: none; border-radius: 10px; padding: 12px; font-weight: 600; color: white; width: 100%; transition: all 0.3s; font-size: 0.95rem; text-decoration: none; display: block; text-align: center; margin-top: 25px; }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(233,69,96,0.4); color: white; }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="avatar-big" th:text="${#strings.substring(user.firstName,0,1)}"></div>
    <div class="profile-name" th:text="${user.firstName + ' ' + user.lastName}"></div>
    <div class="profile-role">
        <span th:class="${'role-badge role-' + user.role}" th:text="${user.role}"></span>
    </div>

    <div class="info-row">
        <div class="info-icon"><i class="fas fa-user"></i></div>
        <div>
            <div class="info-label">Имя пользователя</div>
            <div class="info-value" th:text="${user.username}"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="info-icon"><i class="fas fa-envelope"></i></div>
        <div>
            <div class="info-label">Email</div>
            <div class="info-value" th:text="${user.email}"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="info-icon"><i class="fas fa-id-card"></i></div>
        <div>
            <div class="info-label">Полное имя</div>
            <div class="info-value" th:text="${user.firstName + ' ' + user.lastName}"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="info-icon"><i class="fas fa-shield-alt"></i></div>
        <div>
            <div class="info-label">Роль</div>
            <div class="info-value" th:text="${user.role}"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="info-icon"><i class="fas fa-circle"></i></div>
        <div>
            <div class="info-label">Статус</div>
            <div class="info-value" style="color:#75e096">
                <i class="fas fa-check-circle me-1"></i>Активен
            </div>
        </div>
    </div>

    <a th:href="@{/student/dashboard}" class="btn-back">
        <i class="fas fa-arrow-left me-2"></i>Назад к панели
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
