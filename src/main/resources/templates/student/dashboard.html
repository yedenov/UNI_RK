<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background:#0f0f1a; color:#e0e0e0; min-height:100vh; }
        .sidebar { background:linear-gradient(180deg,#1a1a2e,#16213e); width:250px; min-height:100vh; position:fixed; border-right:1px solid rgba(255,255,255,0.08); padding:25px 0; }
        .sidebar-logo { padding:0 20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:20px; }
        .sidebar-logo h5 { color:white; font-weight:700; margin:0; }
        .nav-item-custom { padding:10px 20px; color:rgba(255,255,255,0.6); display:flex; align-items:center; gap:10px; transition:all 0.2s; text-decoration:none; border-left:3px solid transparent; }
        .nav-item-custom:hover { color:white; background:rgba(233,69,96,0.1); border-left-color:#e94560; }
        .main-content { margin-left:250px; padding:30px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .page-title { font-size:1.6rem; font-weight:700; color:white; }
        .table-card { background:#1a1a2e; border:1px solid rgba(255,255,255,0.08); border-radius:15px; overflow:hidden; margin-bottom:25px; }
        .table-card-header { padding:20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); }
        .table-card-header h5 { color:white; margin:0; font-weight:600; }
        .table { margin:0; color:#e0e0e0; }
        .table thead th { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); border-color:rgba(255,255,255,0.08); font-size:0.8rem; text-transform:uppercase; }
        .table td { border-color:rgba(255,255,255,0.05); vertical-align:middle; }
        .table tbody tr:hover { background:rgba(255,255,255,0.03); }
        .answer-input {
            background: #2a2a3e !important;
            border: 1px solid rgba(233,69,96,0.4) !important;
            border-radius: 8px;
            color: #ffffff !important;
            padding: 6px 12px;
            font-size: 0.85rem;
            width: 180px;
        }
        .answer-input::placeholder {
            color: rgba(255,255,255,0.5) !important;
        }
        .answer-input:focus {
            outline: none;
            border-color: #e94560 !important;
            background: #333350 !important;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.2) !important;
        }
        .btn-submit { background:linear-gradient(135deg,#e94560,#c23152); border:none; border-radius:6px; padding:6px 14px; color:white; font-size:0.8rem; font-weight:600; transition:all 0.2s; cursor:pointer; }
        .btn-submit:hover { transform:translateY(-1px); box-shadow:0 4px 10px rgba(233,69,96,0.4); }
        .lang-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:8px; padding:6px 14px; font-size:0.85rem; }
        .logout-btn { background:rgba(233,69,96,0.15); border:1px solid rgba(233,69,96,0.3); color:#e94560; border-radius:8px; padding:6px 14px; font-size:0.85rem; transition:all 0.2s; }
        .logout-btn:hover { background:#e94560; color:white; }
        .profile-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:8px; padding:6px 14px; font-size:0.85rem; text-decoration:none; }
        .profile-btn:hover { background:rgba(255,255,255,0.15); color:white; }
        .welcome-card { background:linear-gradient(135deg,#0f3460,#16213e); border:1px solid rgba(233,69,96,0.3); border-radius:15px; padding:25px 30px; margin-bottom:25px; }
        .welcome-card h3 { color:white; font-weight:700; margin:0; }
        .welcome-card p { color:rgba(255,255,255,0.6); margin:0; font-size:0.9rem; }
        .score-badge { background:linear-gradient(135deg,#e94560,#c23152); color:white; border-radius:20px; padding:3px 12px; font-weight:700; font-size:0.85rem; }
        .dropdown-menu { background:#1a1a2e; border-color:rgba(255,255,255,0.1); }
        .dropdown-item { color:#e0e0e0; }
        .dropdown-item:hover { background:rgba(255,255,255,0.08); color:white; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
        <span style="font-size:1.5rem">🎓</span>
        <h5 class="mt-2">UniPortal</h5>
        <small style="color:rgba(255,255,255,0.4)" th:text="#{student.panel}">Student Panel</small>
    </div>
    <a th:href="@{/student/dashboard}" class="nav-item-custom">
        <i class="fas fa-home"></i> <span th:text="#{nav.dashboard}">Dashboard</span>
    </a>
    <a th:href="@{/student/profile}" class="nav-item-custom">
        <i class="fas fa-user"></i> <span th:text="#{nav.myProfile}">My Profile</span>
    </a>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="page-title">
            <i class="fas fa-user-graduate me-2" style="color:#e94560"></i>
            <span th:text="#{student.title}">Student Dashboard</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="dropdown">
                <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown">
                    🌐 <span th:text="#{nav.language}">Language</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/student/dashboard(lang='en')}">🇬🇧 English</a></li>
                    <li><a class="dropdown-item" th:href="@{/student/dashboard(lang='ru')}">🇷🇺 Русский</a></li>
                </ul>
            </div>
            <a th:href="@{/student/profile}" class="profile-btn">
                <i class="fas fa-user me-1"></i><span th:text="#{nav.profile}">Profile</span>
            </a>
            <form th:action="@{/auth/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn logout-btn">
                    <i class="fas fa-sign-out-alt me-1"></i><span th:text="#{nav.logout}">Logout</span>
                </button>
            </form>
        </div>
    </div>

    <div class="welcome-card">
        <h3>👋 <span th:text="#{student.welcome}">Welcome</span>, <span th:text="${student.firstName}"></span>!</h3>
        <p th:text="#{student.viewText}">View your assignments and track grades</p>
    </div>

    <!-- Assignments -->
    <div class="table-card">
        <div class="table-card-header">
            <h5><i class="fas fa-tasks me-2" style="color:#e94560"></i><span th:text="#{student.myAssignments}">My Assignments</span></h5>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{student.colTitle}">Title</th>
                <th th:text="#{student.colTeacher}">Teacher</th>
                <th th:text="#{student.colDeadline}">Deadline</th>
                <th th:text="#{student.colStatus}">Status</th>
                <th th:text="#{student.colAction}">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(assignments)}">
                <td colspan="5" class="text-center p-4" style="color:rgba(255,255,255,0.3);font-style:italic" th:text="#{student.noAssignments}">No assignments</td>
            </tr>
            <tr th:each="a : ${assignments}">
                <td th:text="${a.title}"></td>
                <td th:text="${a.teacher.firstName + ' ' + a.teacher.lastName}"></td>
                <td th:text="${#temporals.format(a.deadline, 'dd.MM.yyyy HH:mm')}"></td>
                <td>
                    <span th:if="${a.status.name() == 'PENDING'}" class="badge" style="background:rgba(255,193,7,0.2);color:#ffc107" th:text="#{common.status.pending}">PENDING</span>
                    <span th:if="${a.status.name() == 'SUBMITTED'}" class="badge" style="background:rgba(13,202,240,0.2);color:#0dcaf0" th:text="#{common.status.submitted}">SUBMITTED</span>
                    <span th:if="${a.status.name() == 'GRADED'}" class="badge" style="background:rgba(40,167,69,0.2);color:#75e096" th:text="#{common.status.graded}">GRADED</span>
                </td>
                <td>
                    <div th:if="${a.status.name() == 'PENDING'}">
                        <form th:action="@{/student/submit/{id}(id=${a.id})}" method="post" class="d-flex gap-2 align-items-center">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="text" name="answer" class="answer-input" th:placeholder="#{student.answerPlaceholder}"/>
                            <button type="submit" class="btn-submit" th:text="#{student.submit}">Submit</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Grades -->
    <div class="table-card">
        <div class="table-card-header">
            <h5><i class="fas fa-star me-2" style="color:#e94560"></i><span th:text="#{student.myGrades}">My Grades</span></h5>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{student.colAssignment}">Assignment</th>
                <th th:text="#{student.colScore}">Score</th>
                <th th:text="#{student.colComment}">Comment</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(grades)}">
                <td colspan="3" class="text-center p-4" style="color:rgba(255,255,255,0.3);font-style:italic" th:text="#{student.noGrades}">No grades</td>
            </tr>
            <tr th:each="g : ${grades}">
                <td th:text="${g.assignment.title}"></td>
                <td><span class="score-badge" th:text="${g.score + '/100'}"></span></td>
                <td th:text="${g.comment}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
