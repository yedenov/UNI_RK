<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #0f0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 40px; width: 100%; max-width: 500px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
        }
        .card-title { color: white; font-weight: 700; font-size: 1.4rem; margin-bottom: 5px; }
        .card-subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 30px; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; padding: 10px 15px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.1); border-color: #e94560;
            color: white; box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .form-select option { background: #1a1a2e; }
        .btn-create {
            background: linear-gradient(135deg, #e94560, #c23152); border: none;
            border-radius: 10px; padding: 12px; font-weight: 600; color: white;
            width: 100%; transition: all 0.3s; font-size: 1rem;
        }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(233,69,96,0.4); color: white; }
        .btn-back {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: rgba(255,255,255,0.6);
            width: 100%; transition: all 0.2s; font-size: 0.9rem;
            text-decoration: none; display: block; text-align: center; margin-top: 10px;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; }
        .role-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="text-center mb-4" style="font-size:2.5rem">👤</div>
    <div class="card-title text-center" th:text="#{admin.createUser}">Create User</div>
    <div class="card-subtitle text-center">Add a new teacher or student</div>

    <form th:action="@{/admin/create-user}" method="post">
        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="firstName" class="form-control" placeholder="John" required/>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="lastName" class="form-control" placeholder="Doe" required/>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="username" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@university.kz" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <div class="mb-4">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
                <option value="STUDENT">👨‍🎓 Student</option>
                <option value="TEACHER">👨‍🏫 Teacher</option>
            </select>
        </div>
        <button type="submit" class="btn-create">
            <i class="fas fa-user-plus me-2"></i>Create User
        </button>
    </form>
    <a th:href="@{/admin/dashboard}" class="btn-back">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
