<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .sidebar { background: linear-gradient(180deg,#1a1a2e,#16213e); width:250px; min-height:100vh; position:fixed; border-right:1px solid rgba(255,255,255,0.08); padding:25px 0; }
        .sidebar-logo { padding:0 20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:20px; }
        .sidebar-logo h5 { color:white; font-weight:700; margin:0; }
        .nav-item-custom { padding:10px 20px; color:rgba(255,255,255,0.6); display:flex; align-items:center; gap:10px; transition:all 0.2s; text-decoration:none; border-left:3px solid transparent; }
        .nav-item-custom:hover { color:white; background:rgba(233,69,96,0.1); border-left-color:#e94560; }
        .main-content { margin-left:250px; padding:30px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .page-title { font-size:1.6rem; font-weight:700; color:white; }
        .stat-card { background:linear-gradient(135deg,#1a1a2e,#16213e); border:1px solid rgba(255,255,255,0.08); border-radius:15px; padding:25px; transition:transform 0.2s; }
        .stat-card:hover { transform:translateY(-3px); }
        .stat-icon { font-size:2rem; margin-bottom:10px; }
        .stat-number { font-size:2rem; font-weight:700; color:white; }
        .stat-label { color:rgba(255,255,255,0.5); font-size:0.85rem; }
        .table-card { background:#1a1a2e; border:1px solid rgba(255,255,255,0.08); border-radius:15px; overflow:hidden; margin-bottom:25px; }
        .table-card-header { padding:20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; }
        .table-card-header h5 { color:white; margin:0; font-weight:600; }
        .table { margin:0; color:#e0e0e0; }
        .table thead th { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); border-color:rgba(255,255,255,0.08); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; }
        .table td { border-color:rgba(255,255,255,0.05); vertical-align:middle; }
        .table tbody tr:hover { background:rgba(255,255,255,0.03); }
        .btn-primary-custom { background:linear-gradient(135deg,#e94560,#c23152); border:none; border-radius:8px; padding:8px 18px; color:white; font-weight:600; font-size:0.85rem; transition:all 0.3s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary-custom:hover { transform:translateY(-1px); box-shadow:0 5px 15px rgba(233,69,96,0.4); color:white; }
        .btn-danger-sm { background:rgba(233,69,96,0.2); border:1px solid rgba(233,69,96,0.3); color:#e94560; border-radius:6px; padding:4px 10px; font-size:0.8rem; transition:all 0.2s; cursor:pointer; }
        .btn-danger-sm:hover { background:#e94560; color:white; }
        .lang-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:8px; padding:6px 14px; font-size:0.85rem; }
        .logout-btn { background:rgba(233,69,96,0.15); border:1px solid rgba(233,69,96,0.3); color:#e94560; border-radius:8px; padding:6px 14px; font-size:0.85rem; transition:all 0.2s; }
        .logout-btn:hover { background:#e94560; color:white; }
        .avatar { width:35px; height:35px; border-radius:50%; background:linear-gradient(135deg,#e94560,#c23152); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; font-size:0.85rem; }
        .dropdown-menu { background:#1a1a2e; border-color:rgba(255,255,255,0.1); }
        .dropdown-item { color:#e0e0e0; }
        .dropdown-item:hover { background:rgba(255,255,255,0.08); color:white; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
        <span style="font-size:1.5rem">🎓</span>
        <h5 class="mt-2">UniPortal</h5>
        <small style="color:rgba(255,255,255,0.4)" th:text="#{admin.panel}">Admin Panel</small>
    </div>
    <a href="#teachers" class="nav-item-custom">
        <i class="fas fa-chalkboard-teacher"></i> <span th:text="#{admin.teachers}">Teachers</span>
    </a>
    <a href="#students" class="nav-item-custom">
        <i class="fas fa-user-graduate"></i> <span th:text="#{admin.students}">Students</span>
    </a>
    <a th:href="@{/admin/create-user}" class="nav-item-custom">
        <i class="fas fa-user-plus"></i> <span th:text="#{admin.createUser}">Create User</span>
    </a>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="page-title">
            <i class="fas fa-tachometer-alt me-2" style="color:#e94560"></i>
            <span th:text="#{admin.title}">Admin Dashboard</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="dropdown">
                <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown">
                    🌐 <span th:text="#{nav.language}">Language</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/admin/dashboard(lang='en')}">🇬🇧 English</a></li>
                    <li><a class="dropdown-item" th:href="@{/admin/dashboard(lang='ru')}">🇷🇺 Русский</a></li>
                </ul>
            </div>
            <form th:action="@{/auth/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn logout-btn">
                    <i class="fas fa-sign-out-alt me-1"></i><span th:text="#{nav.logout}">Logout</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon">👨‍🏫</div>
                <div class="stat-number" th:text="${teachers.size()}">0</div>
                <div class="stat-label" th:text="#{admin.teachers}">Teachers</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon">👨‍🎓</div>
                <div class="stat-number" th:text="${students.size()}">0</div>
                <div class="stat-label" th:text="#{admin.students}">Students</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-number" th:text="${teachers.size() + students.size()}">0</div>
                <div class="stat-label" th:text="#{admin.totalUsers}">Total Users</div>
            </div>
        </div>
    </div>

    <!-- Teachers -->
    <div class="table-card" id="teachers">
        <div class="table-card-header">
            <h5><i class="fas fa-chalkboard-teacher me-2" style="color:#e94560"></i><span th:text="#{admin.teachers}">Teachers</span></h5>
            <a th:href="@{/admin/create-user}" class="btn-primary-custom">
                <i class="fas fa-plus"></i> <span th:text="#{admin.createUser}">Create User</span>
            </a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{admin.name}">Name</th>
                <th th:text="#{admin.email}">Email</th>
                <th th:text="#{admin.status}">Status</th>
                <th th:text="#{admin.action}">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(teachers)}">
                <td colspan="4" class="text-center p-4" style="color:rgba(255,255,255,0.3);font-style:italic" th:text="#{admin.noTeachers}">No teachers</td>
            </tr>
            <tr th:each="t : ${teachers}">
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar" th:text="${#strings.substring(t.firstName,0,1)}"></div>
                        <span th:text="${t.firstName + ' ' + t.lastName}"></span>
                    </div>
                </td>
                <td th:text="${t.email}"></td>
                <td><span class="badge" style="background:rgba(40,167,69,0.2);color:#75e096" th:text="#{admin.active}">Active</span></td>
                <td>
                    <form th:action="@{/admin/delete-user/{id}(id=${t.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn-danger-sm" th:text="#{admin.disable}">Disable</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Students -->
    <div class="table-card" id="students">
        <div class="table-card-header">
            <h5><i class="fas fa-user-graduate me-2" style="color:#e94560"></i><span th:text="#{admin.students}">Students</span></h5>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{admin.name}">Name</th>
                <th th:text="#{admin.email}">Email</th>
                <th th:text="#{admin.status}">Status</th>
                <th th:text="#{admin.action}">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="4" class="text-center p-4" style="color:rgba(255,255,255,0.3);font-style:italic" th:text="#{admin.noStudents}">No students</td>
            </tr>
            <tr th:each="s : ${students}">
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar" th:text="${#strings.substring(s.firstName,0,1)}"></div>
                        <span th:text="${s.firstName + ' ' + s.lastName}"></span>
                    </div>
                </td>
                <td th:text="${s.email}"></td>
                <td><span class="badge" style="background:rgba(40,167,69,0.2);color:#75e096" th:text="#{admin.active}">Active</span></td>
                <td>
                    <form th:action="@{/admin/delete-user/{id}(id=${s.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn-danger-sm" th:text="#{admin.disable}">Disable</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
