<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎓 UniManagement</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>

            <div sec:authorize="hasRole('STUDENT')">
                <a class="nav-link" th:href="@{/student/profile}" th:text="#{nav.profile}">Profile</a>
            </div>

            <!-- Language switcher -->
            <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">🌐 Language</a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{''(lang='en')}">🇬🇧 English</a></li>
                    <li><a class="dropdown-item" th:href="@{''(lang='ru')}">🇷🇺 Русский</a></li>
                    <li><a class="dropdown-item" th:href="@{''(lang='kk')}">🇰🇿 Қазақша</a></li>
                </ul>
            </div>

            <a class="nav-link" th:href="@{/auth/logout}" th:text="#{nav.logout}">Logout</a>
        </div>
    </div>
</nav>
</body>
</html>
