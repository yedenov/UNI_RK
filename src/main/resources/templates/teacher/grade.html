<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Grade Assignment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #0f0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 580px; box-shadow: 0 25px 45px rgba(0,0,0,0.4); }
        .card-title { color: white; font-weight: 700; font-size: 1.4rem; margin-bottom: 5px; }
        .card-subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 25px; }
        .info-block { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .info-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .info-value { color: white; font-size: 0.95rem; }
        .answer-block { background: rgba(233,69,96,0.05); border: 1px solid rgba(233,69,96,0.2); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .answer-label { color: #e94560; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
        .answer-text { color: rgba(255,255,255,0.85); font-size: 0.95rem; line-height: 1.6; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; }
        .form-control {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; padding: 10px 15px;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: #e94560; color: white; box-shadow: 0 0 0 3px rgba(233,69,96,0.2); }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        textarea.form-control { resize: vertical; min-height: 90px; }
        .score-hint { color: rgba(255,255,255,0.3); font-size: 0.8rem; margin-top: 5px; }
        .btn-grade { background: linear-gradient(135deg, #28a745, #1e7e34); border: none; border-radius: 10px; padding: 12px; font-weight: 600; color: white; width: 100%; transition: all 0.3s; font-size: 1rem; }
        .btn-grade:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(40,167,69,0.4); color: white; }
        .btn-back { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; color: rgba(255,255,255,0.6); width: 100%; transition: all 0.2s; font-size: 0.9rem; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; }
        .student-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #c23152); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="text-center mb-3" style="font-size:2.5rem">⭐</div>
    <div class="card-title text-center">Оценить задание</div>
    <div class="card-subtitle text-center" th:text="${assignment.title}"></div>

    <div class="info-block">
        <div class="d-flex align-items-center gap-3">
            <div class="student-avatar" th:text="${#strings.substring(assignment.student.firstName,0,1)}"></div>
            <div>
                <div class="info-label">Студент</div>
                <div class="info-value" th:text="${assignment.student.firstName + ' ' + assignment.student.lastName}"></div>
            </div>
        </div>
    </div>

    <div class="answer-block">
        <div class="answer-label"><i class="fas fa-file-alt me-1"></i>Ответ студента</div>
        <div class="answer-text" th:text="${assignment.studentAnswer}"></div>
    </div>

    <form th:action="@{/teacher/grade/{id}(id=${assignment.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label class="form-label">Оценка</label>
            <input type="number" name="score" class="form-control" min="0" max="100" placeholder="0 - 100" required/>
            <div class="score-hint">Введите число от 0 до 100</div>
        </div>
        <div class="mb-4">
            <label class="form-label">Комментарий</label>
            <textarea name="comment" class="form-control" placeholder="Оставьте комментарий студенту..."></textarea>
        </div>
        <button type="submit" class="btn-grade">
            <i class="fas fa-check me-2"></i>Поставить оценку
        </button>
    </form>
    <a th:href="@{/teacher/dashboard}" class="btn-back">
        <i class="fas fa-arrow-left me-2"></i>Назад к панели
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
