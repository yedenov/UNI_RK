<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Assignment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #0f0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 560px; box-shadow: 0 25px 45px rgba(0,0,0,0.4); }
        .card-title { color: white; font-weight: 700; font-size: 1.4rem; text-align: center; margin-bottom: 5px; }
        .card-subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center; margin-bottom: 30px; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; padding: 10px 15px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.1); border-color: #e94560;
            color: white; box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        .form-select option { background: #1a1a2e; }
        .btn-create { background: linear-gradient(135deg, #e94560, #c23152); border: none; border-radius: 10px; padding: 12px; font-weight: 600; color: white; width: 100%; transition: all 0.3s; font-size: 1rem; }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(233,69,96,0.4); color: white; }
        .btn-back { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; color: rgba(255,255,255,0.6); width: 100%; transition: all 0.2s; font-size: 0.9rem; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>
<div class="card">
    <div class="text-center mb-3" style="font-size:2.5rem">📋</div>
    <div class="card-title">Создать задание</div>
    <div class="card-subtitle">Назначьте задание студенту</div>

    <form th:action="@{/teacher/create-assignment}" method="post">
        <div class="mb-3">
            <label class="form-label">Название задания</label>
            <input type="text" name="title" class="form-control" placeholder="Лабораторная работа №1" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" placeholder="Опишите задание подробно..."></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Дедлайн</label>
            <input type="datetime-local" name="deadline" class="form-control" required/>
        </div>
        <div class="mb-4">
            <label class="form-label">Назначить студенту</label>
            <select name="studentId" class="form-select">
                <option th:each="s : ${students}"
                        th:value="${s.id}"
                        th:text="${s.firstName + ' ' + s.lastName}"></option>
            </select>
        </div>
        <button type="submit" class="btn-create">
            <i class="fas fa-paper-plane me-2"></i>Отправить задание
        </button>
    </form>
    <a th:href="@{/teacher/dashboard}" class="btn-back">
        <i class="fas fa-arrow-left me-2"></i>Назад к панели
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
