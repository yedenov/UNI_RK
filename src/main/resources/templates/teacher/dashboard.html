<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background:#0f0f1a; color:#e0e0e0; min-height:100vh; }
        .sidebar { background:linear-gradient(180deg,#1a1a2e,#16213e); width:250px; min-height:100vh; position:fixed; border-right:1px solid rgba(255,255,255,0.08); padding:25px 0; }
        .sidebar-logo { padding:0 20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:20px; }
        .sidebar-logo h5 { color:white; font-weight:700; margin:0; }
        .nav-item-custom { padding:10px 20px; color:rgba(255,255,255,0.6); display:flex; align-items:center; gap:10px; transition:all 0.2s; text-decoration:none; border-left:3px solid transparent; }
        .nav-item-custom:hover { color:white; background:rgba(233,69,96,0.1); border-left-color:#e94560; }
        .main-content { margin-left:250px; padding:30px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .page-title { font-size:1.6rem; font-weight:700; color:white; }
        .table-card { background:#1a1a2e; border:1px solid rgba(255,255,255,0.08); border-radius:15px; overflow:hidden; }
        .table-card-header { padding:20px 25px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; }
        .table-card-header h5 { color:white; margin:0; font-weight:600; }
        .table { margin:0; color:#e0e0e0; }
        .table thead th { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); border-color:rgba(255,255,255,0.08); font-size:0.8rem; text-transform:uppercase; }
        .table td { border-color:rgba(255,255,255,0.05); vertical-align:middle; }
        .table tbody tr:hover { background:rgba(255,255,255,0.03); }
        .btn-primary-custom { background:linear-gradient(135deg,#e94560,#c23152); border:none; border-radius:8px; padding:8px 18px; color:white; font-weight:600; font-size:0.85rem; transition:all 0.3s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary-custom:hover { transform:translateY(-1px); box-shadow:0 5px 15px rgba(233,69,96,0.4); color:white; }
        .btn-grade { background:rgba(40,167,69,0.2); border:1px solid rgba(40,167,69,0.3); color:#75e096; border-radius:6px; padding:4px 12px; font-size:0.8rem; text-decoration:none; transition:all 0.2s; display:inline-block; }
        .btn-grade:hover { background:#28a745; color:white; }
        .lang-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:8px; padding:6px 14px; font-size:0.85rem; }
        .logout-btn { background:rgba(233,69,96,0.15); border:1px solid rgba(233,69,96,0.3); color:#e94560; border-radius:8px; padding:6px 14px; font-size:0.85rem; transition:all 0.2s; }
        .logout-btn:hover { background:#e94560; color:white; }
        .welcome-card { background:linear-gradient(135deg,#e94560,#c23152); border-radius:15px; padding:25px 30px; margin-bottom:25px; }
        .welcome-card h3 { color:white; font-weight:700; margin:0; }
        .welcome-card p { color:rgba(255,255,255,0.8); margin:0; font-size:0.9rem; }
        .dropdown-menu { background:#1a1a2e; border-color:rgba(255,255,255,0.1); }
        .dropdown-item { color:#e0e0e0; }
        .dropdown-item:hover { background:rgba(255,255,255,0.08); color:white; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
        <span style="font-size:1.5rem">🎓</span>
        <h5 class="mt-2">UniPortal</h5>
        <small style="color:rgba(255,255,255,0.4)" th:text="#{teacher.panel}">Teacher Panel</small>
    </div>
    <a th:href="@{/teacher/dashboard}" class="nav-item-custom">
        <i class="fas fa-home"></i> <span th:text="#{nav.dashboard}">Dashboard</span>
    </a>
    <a th:href="@{/teacher/create-assignment}" class="nav-item-custom">
        <i class="fas fa-plus-circle"></i> <span th:text="#{nav.newAssignment}">New Assignment</span>
    </a>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="page-title">
            <i class="fas fa-chalkboard-teacher me-2" style="color:#e94560"></i>
            <span th:text="#{teacher.title}">Teacher Dashboard</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="dropdown">
                <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown">
                    🌐 <span th:text="#{nav.language}">Language</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/teacher/dashboard(lang='en')}">🇬🇧 English</a></li>
                    <li><a class="dropdown-item" th:href="@{/teacher/dashboard(lang='ru')}">🇷🇺 Русский</a></li>
                </ul>
            </div>
            <form th:action="@{/auth/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn logout-btn">
                    <i class="fas fa-sign-out-alt me-1"></i><span th:text="#{nav.logout}">Logout</span>
                </button>
            </form>
        </div>
    </div>

    <div class="welcome-card">
        <h3>👋 <span th:text="#{teacher.welcome}">Welcome</span>, <span th:text="${teacher.firstName}"></span>!</h3>
        <p th:text="#{teacher.manageText}">Manage your assignments and grade students</p>
    </div>

    <div class="table-card">
        <div class="table-card-header">
            <h5><i class="fas fa-tasks me-2" style="color:#e94560"></i><span th:text="#{teacher.assignments}">Assignments</span></h5>
            <a th:href="@{/teacher/create-assignment}" class="btn-primary-custom">
                <i class="fas fa-plus"></i> <span th:text="#{teacher.createAssignment}">New Assignment</span>
            </a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{teacher.colTitle}">Title</th>
                <th th:text="#{teacher.colStudent}">Student</th>
                <th th:text="#{teacher.colStatus}">Status</th>
                <th th:text="#{teacher.colDeadline}">Deadline</th>
                <th th:text="#{teacher.colAction}">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(assignments)}">
                <td colspan="5" class="text-center p-4" style="color:rgba(255,255,255,0.3);font-style:italic" th:text="#{teacher.noAssignments}">No assignments</td>
            </tr>
            <tr th:each="a : ${assignments}">
                <td th:text="${a.title}"></td>
                <td th:text="${a.student.firstName + ' ' + a.student.lastName}"></td>
                <td>
                    <span th:if="${a.status.name() == 'PENDING'}" class="badge" style="background:rgba(255,193,7,0.2);color:#ffc107" th:text="#{common.status.pending}">PENDING</span>
                    <span th:if="${a.status.name() == 'SUBMITTED'}" class="badge" style="background:rgba(13,202,240,0.2);color:#0dcaf0" th:text="#{common.status.submitted}">SUBMITTED</span>
                    <span th:if="${a.status.name() == 'GRADED'}" class="badge" style="background:rgba(40,167,69,0.2);color:#75e096" th:text="#{common.status.graded}">GRADED</span>
                </td>
                <td th:text="${#temporals.format(a.deadline, 'dd.MM.yyyy HH:mm')}"></td>
                <td>
                    <a th:if="${a.status.name() == 'SUBMITTED'}"
                       th:href="@{/teacher/grade/{id}(id=${a.id})}"
                       class="btn-grade">
                        <i class="fas fa-star me-1"></i><span th:text="#{teacher.grade}">Grade</span>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
